name: macOS Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build LunarBar
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project LunarBar.xcodeproj \
            -scheme LunarBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          APP_PATH="build/DerivedData/Build/Products/Debug/LunarBar.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" LunarBar-debug.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: LunarBar-debug
          path: LunarBar-debug.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            LunarBar-debug.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "LunarBar ${GITHUB_REF_NAME}" \
            --notes "Debug build generated by GitHub Actions."
